<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect ChatGPT Clone</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .header { background: white; border-bottom: 1px solid #ddd; padding: 20px; }
        .chat { flex: 1; overflow-y: auto; padding: 20px; background: #f5f5f5; }
        .message { margin: 10px 0; padding: 10px; border-radius: 10px; max-width: 70%; }
        .user { background: #007bff; color: white; margin-left: auto; }
        .assistant { background: white; border: 1px solid #ddd; }
        .input-area { background: white; border-top: 1px solid #ddd; padding: 20px; display: flex; gap: 10px; }
        .input-area input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .input-area button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .input-area button:disabled { background: #ccc; cursor: not-allowed; }
        .welcome { text-align: center; padding: 50px 20px; color: #666; }
        .streaming { background: white; border: 1px solid #ddd; position: relative; }
        .typing { color: #007bff; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 Perfect ChatGPT Clone</h1>
        <p>Powered by WizardLM-2-8x22B • <span id="status">🟢 Connected</span></p>
    </div>
    
    <div class="chat" id="chat">
        <div class="welcome">
            <h2>Welcome to Perfect ChatGPT Clone</h2>
            <p>Start a conversation with AI. Ask anything!</p>
        </div>
    </div>
    
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Type your message..." />
        <button id="sendButton" onclick="sendMessage()">Send</button>
    </div>

    <script>
        let messages = [];
        let isLoading = false;

        function addMessage(content, role) {
            const chat = document.getElementById('chat');
            const message = document.createElement('div');
            message.className = `message ${role}`;
            message.textContent = content;
            chat.appendChild(message);
            chat.scrollTop = chat.scrollHeight;
            
            // Remove welcome message
            const welcome = chat.querySelector('.welcome');
            if (welcome) welcome.remove();
        }

        function showTyping() {
            const chat = document.getElementById('chat');
            const typing = document.createElement('div');
            typing.className = 'message streaming';
            typing.id = 'streaming';
            typing.innerHTML = '<div id="streamContent"></div><div class="typing">🤖 AI is typing...</div>';
            chat.appendChild(typing);
            chat.scrollTop = chat.scrollHeight;
        }

        function updateStreaming(content) {
            const streamContent = document.getElementById('streamContent');
            if (streamContent) {
                streamContent.textContent = content;
            }
        }

        function finishStreaming(finalContent) {
            const streaming = document.getElementById('streaming');
            if (streaming) {
                streaming.remove();
                addMessage(finalContent, 'assistant');
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const sendButton = document.getElementById('sendButton');
            const message = input.value.trim();
            
            if (!message || isLoading) return;
            
            isLoading = true;
            input.value = '';
            input.disabled = true;
            sendButton.disabled = true;
            sendButton.textContent = 'Sending...';
            
            // Add user message
            addMessage(message, 'user');
            
            // Show typing indicator
            showTyping();
            
            try {
                const response = await fetch('http://localhost:8000/api/v1/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                if (!response.ok) throw new Error(`Server error: ${response.status}`);

                const reader = response.body.getReader();
                let fullResponse = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = new TextDecoder().decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data.trim() === '[DONE]') continue;

                            try {
                                const parsed = JSON.parse(data);
                                
                                if (parsed.error) {
                                    console.error('AI Error:', parsed.error);
                                    continue;
                                }
                                
                                if (parsed.content) {
                                    fullResponse += parsed.content;
                                    updateStreaming(fullResponse);
                                }
                                
                                if (parsed.done) {
                                    finishStreaming(fullResponse);
                                    break;
                                }
                            } catch (e) {
                                console.error('Parse error:', e);
                            }
                        }
                    }
                }
            } catch (error) {
                console.error('Error:', error);
                const streaming = document.getElementById('streaming');
                if (streaming) streaming.remove();
                addMessage('❌ Error: Failed to get AI response. Please try again.', 'assistant');
            } finally {
                isLoading = false;
                input.disabled = false;
                sendButton.disabled = false;
                sendButton.textContent = 'Send';
                input.focus();
            }
        }

        // Handle Enter key
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Focus input on load
        document.getElementById('messageInput').focus();
    </script>
</body>
</html>
