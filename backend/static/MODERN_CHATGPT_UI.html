<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rajan AI Assistant | Advanced AI Chat Interface</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', 'Roboto', sans-serif;
            background: #0a0a0a;
            color: #ececec;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(16, 185, 129, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(59, 130, 246, 0.08) 0%, transparent 50%);
            pointer-events: none;
            animation: gradientShift 20s ease infinite;
        }
        
        @keyframes gradientShift {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        

        

        
        .container {
            display: flex;
            height: 100vh;
            position: relative;
            z-index: 1;
        }
        
        .sidebar {
            width: 280px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        
        .logo {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 30px;
            text-align: center;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }
        
        .new-chat-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            padding: 15px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            margin-bottom: 25px;
            font-family: 'Inter', sans-serif;
        }
        
        .new-chat-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }
        
        .chat-history {
            flex: 1;
        }
        
        .chat-item {
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid transparent;
        }
        
        .chat-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }
        
        .chat-header {
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(20px);
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
        }
        
        .message {
            margin-bottom: 25px;
            display: flex;
            align-items: flex-start;
            gap: 15px;
            opacity: 0;
            animation: fadeInUp 0.5s ease forwards;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            flex-shrink: 0;
        }
        
        .user-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .assistant-avatar {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .message-content {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            padding: 16px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            font-size: 15px;
            line-height: 1.6;
        }
        
        .message-content::before {
            content: '';
            position: absolute;
            top: 50%;
            left: -8px;
            transform: translateY(-50%);
            border: 8px solid transparent;
            border-right-color: rgba(255, 255, 255, 0.08);
        }
        
        .chat-input-container {
            padding: 20px 30px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .chat-input-wrapper {
            position: relative;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
        }
        
        .chat-input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #ececec;
            font-size: 15px;
            padding: 18px 60px 18px 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            resize: none;
            min-height: 24px;
            max-height: 200px;
            line-height: 1.5;
        }
        
        .chat-input::placeholder {
            color: rgba(236, 236, 236, 0.4);
            font-weight: 400;
        }
        
        .send-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            color: white;
            font-size: 18px;
        }
        
        .send-btn:hover {
            transform: translateY(-50%) scale(1.05);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .typing-indicator {
            display: none;
            padding: 20px;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .typing-dots {
            display: inline-block;
        }
        
        .typing-dots span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }
        
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-10px); opacity: 1; }
        }
        
        .status-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 15px;
            border-radius: 25px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 14px;
            z-index: 1000;
        }
        
        .status-connected {
            color: #4CAF50;
        }
        
        .status-disconnected {
            color: #f44336;
        }
        
        pre code {
            background: rgba(0, 0, 0, 0.6) !important;
            border-radius: 8px;
            padding: 15px;
            display: block;
            overflow-x: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
            font-size: 14px;
            line-height: 1.5;
        }
        
        code {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
            font-size: 13px;
        }
        
        .message-content p {
            margin: 0 0 8px 0;
            line-height: 1.6;
            font-size: 15px;
            color: #ececec;
        }
        
        .message-content ul, .message-content ol {
            margin: 8px 0;
            padding-left: 20px;
        }
        
        .message-content li {
            margin: 4px 0;
            line-height: 1.6;
        }
        
        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
        }
        
        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -280px;
                z-index: 1000;
                transition: left 0.3s ease;
            }
            
            .sidebar.open {
                left: 0;
            }
            
            .main-chat {
                width: 100%;
            }
            
            .theme-controls {
                top: 10px;
                right: 10px;
                padding: 6px;
            }
            
            .theme-btn {
                width: 20px;
                height: 20px;
            }
        }
    </style>
</head>
<body>


    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">🚀 Rajan AI Assistant</div>
            <button class="new-chat-btn" onclick="startNewChat()">+ New Chat</button>
            <div class="chat-history" id="chatHistory">
                <!-- Chat history will be populated here -->
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="main-chat">
            <div class="chat-header">
                <h2>Rajan AI Assistant</h2>
                <p style="opacity: 0.7; margin-top: 5px;">Advanced Intelligence • Premium Experience</p>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <div class="message">
                    <div class="message-avatar assistant-avatar">🚀</div>
                    <div class="message-content">
                        <p>Hello! I'm Rajan AI Assistant, your advanced AI companion. How can I help you today?</p>
                    </div>
                </div>
            </div>
            
            <div class="typing-indicator" id="typingIndicator">
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                Rajan AI is thinking...
            </div>
            
            <div class="chat-input-container">
                <div class="chat-input-wrapper">
                    <textarea class="chat-input" id="chatInput" placeholder="Ask Rajan AI anything..." rows="1"></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">▶</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Status Indicator -->
    <div class="status-indicator" id="statusIndicator">
        <span class="status-connected">● Connected</span>
    </div>

    <script>
        let currentConversationId = null;
        let conversations = [];
        const API_BASE = 'http://localhost:8000';

        // Auto-resize textarea
        const chatInput = document.getElementById('chatInput');
        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // Send message on Enter (Shift+Enter for new line)
        chatInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Load conversations on page load
        window.addEventListener('load', async () => {
            await loadConversations();
            checkBackendHealth();
            setInterval(checkBackendHealth, 30000); // Check every 30 seconds
        });

        async function checkBackendHealth() {
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                const statusIndicator = document.getElementById('statusIndicator');
                
                if (response.ok && data.status === 'healthy') {
                    statusIndicator.innerHTML = '<span class="status-connected">● Connected</span>';
                } else {
                    statusIndicator.innerHTML = '<span class="status-disconnected">● Disconnected</span>';
                }
            } catch (error) {
                document.getElementById('statusIndicator').innerHTML = '<span class="status-disconnected">● Connection Error</span>';
            }
        }

        async function loadConversations() {
            try {
                const response = await fetch(`${API_BASE}/api/v1/conversations`);
                conversations = await response.json();
                renderConversations();
            } catch (error) {
                console.error('Error loading conversations:', error);
            }
        }

        function renderConversations() {
            const chatHistory = document.getElementById('chatHistory');
            chatHistory.innerHTML = '';
            
            conversations.forEach(conv => {
                const chatItem = document.createElement('div');
                chatItem.className = 'chat-item';
                chatItem.textContent = conv.title || 'New Conversation';
                chatItem.onclick = () => loadConversation(conv.id);
                chatHistory.appendChild(chatItem);
            });
        }

        async function startNewChat() {
            currentConversationId = null;
            document.getElementById('chatMessages').innerHTML = `
                <div class="message">
                    <div class="message-avatar assistant-avatar">🤖</div>
                    <div class="message-content">
                        <p>Hello! I'm your AI assistant. How can I help you today?</p>
                    </div>
                </div>
            `;
            document.getElementById('chatInput').focus();
        }

        async function loadConversation(conversationId) {
            currentConversationId = conversationId;
            // In a real implementation, you would load messages for this conversation
            // For now, we'll just clear the chat
            startNewChat();
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            // Clear input
            input.value = '';
            input.style.height = 'auto';
            
            // Add user message to chat
            addMessageToChat('user', message);
            
            // Show typing indicator
            showTypingIndicator();
            
            try {
                // Create conversation if needed
                if (!currentConversationId) {
                    const convResponse = await fetch(`${API_BASE}/api/v1/conversations`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title: message.substring(0, 50) + '...' })
                    });
                    const newConv = await convResponse.json();
                    currentConversationId = newConv.id;
                }
                
                // Send message to streaming endpoint
                const response = await fetch(`${API_BASE}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        conversation_id: currentConversationId
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                // Hide typing indicator
                hideTypingIndicator();
                
                // Create assistant message element
                const assistantMessage = addMessageToChat('assistant', '');
                const messageContent = assistantMessage.querySelector('.message-content p');
                
                // Read the stream
                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let buffer = '';
                let fullResponse = '';
                
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // Keep incomplete line in buffer
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data.trim() === '[DONE]') continue;
                            
                            try {
                                const parsed = JSON.parse(data);
                                if (parsed.content) {
                                    // Clean the content to ensure proper text display
                                    const cleanContent = parsed.content
                                        .replace(/[\u0000-\u0008\u000B\u000C\u000E-\u001F\u007F]/g, '') // Remove control characters
                                        .replace(/\uFEFF/g, ''); // Remove BOM
                                    
                                    fullResponse += cleanContent;
                                    
                                    // Update display with clean text (not markdown yet)
                                    messageContent.textContent = fullResponse;
                                    
                                    // Scroll to bottom
                                    document.getElementById('chatMessages').scrollTop = 
                                        document.getElementById('chatMessages').scrollHeight;
                                }
                            } catch (e) {
                                console.log('Parse error:', e, 'Data:', data);
                            }
                        }
                    }
                }
                
                // After streaming is complete, apply markdown rendering
                if (fullResponse.trim()) {
                    messageContent.innerHTML = marked.parse(fullResponse);
                    // Apply syntax highlighting
                    messageContent.querySelectorAll('pre code').forEach(block => {
                        hljs.highlightElement(block);
                    });
                    
                    // Final scroll to bottom
                    document.getElementById('chatMessages').scrollTop = 
                        document.getElementById('chatMessages').scrollHeight;
                }
                
                // Reload conversations to show updated list
                await loadConversations();
                
            } catch (error) {
                hideTypingIndicator();
                console.error('Error sending message:', error);
                addMessageToChat('assistant', `Sorry, I encountered an error: ${error.message}. Please try again.`);
            }
        }

        function addMessageToChat(role, content) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            
            const avatar = role === 'user' ? '👤' : '🚀';
            const avatarClass = role === 'user' ? 'user-avatar' : 'assistant-avatar';
            
            // For streaming messages, don't apply markdown until complete
            const displayContent = role === 'assistant' && content === '' ? '' : 
                                  role === 'assistant' ? marked.parse(content) : content;
            
            messageDiv.innerHTML = `
                <div class="message-avatar ${avatarClass}">${avatar}</div>
                <div class="message-content">
                    <p>${displayContent}</p>
                </div>
            `;
            
            chatMessages.appendChild(messageDiv);
            
            // Apply syntax highlighting for assistant messages with content
            if (role === 'assistant' && content) {
                messageDiv.querySelectorAll('pre code').forEach(block => {
                    hljs.highlightElement(block);
                });
            }
            
            // Scroll to bottom
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            return messageDiv;
        }

        function showTypingIndicator() {
            document.getElementById('typingIndicator').style.display = 'block';
            document.getElementById('chatMessages').scrollTop = 
                document.getElementById('chatMessages').scrollHeight;
        }

        function hideTypingIndicator() {
            document.getElementById('typingIndicator').style.display = 'none';
        }
    </script>
</body>
</html>
